openapi: 3.1.0
info:
  title: NXT TIME PULSE Admin API
  version: 1.0.0
  description: Admin-gated API endpoints for GEO TIMESHEET - TIMEPULSE

servers:
  - url: /api
    description: API base path

security:
  - bearerAuth: []

paths:
  /users/invite:
    post:
      summary: Invite user by email (admin/manager only)
      tags: [Users]
      security: [{ bearerAuth: [] }]
      requestBody:
        content:
          application/json:
            schema:
              type: object
              required: [email]
              properties:
                email: { type: string, format: email }
                role: { type: string, enum: [admin, manager, worker] }
      responses:
        "200":
          description: Invitation sent
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "409":
          description: User already member or already invited
  /users/add:
    post:
      summary: Add existing Clerk user by email (admin/manager only)
      tags: [Users]
      security: [{ bearerAuth: [] }]
      requestBody:
        content:
          application/json:
            schema:
              type: object
              required: [email]
              properties:
                email: { type: string, format: email }
                role: { type: string, enum: [admin, manager, worker] }
      responses:
        "200":
          description: User added
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          description: User not found in Clerk
        "409":
          description: User already member
  /users:
    get:
      summary: List users (admin/manager only)
      tags: [Users]
      security: [{ bearerAuth: [] }]
      responses:
        "200":
          description: List of org users
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/User" }
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"

  /users/{id}:
    patch:
      summary: Update user role/status (admin/manager only)
      tags: [Users]
      security: [{ bearerAuth: [] }]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/UserUpdate" }
      responses:
        "200":
          description: Updated user
          content:
            application/json:
              schema: { $ref: "#/components/schemas/User" }
        "400":
          description: Validation failed
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          description: User not found
    delete:
      summary: Remove user from organization (admin/manager only)
      tags: [Users]
      security: [{ bearerAuth: [] }]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      responses:
        "200":
          description: User removed
        "400":
          description: Cannot remove yourself
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          description: User not found

  /users/{id}/timeline:
    get:
      summary: User lifecycle timeline, assignment history, and pending requests
      tags: [Users]
      security: [{ bearerAuth: [] }]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      responses:
        "200":
          description: User timeline payload
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          description: User not found

  /users/{id}/offboard:
    post:
      summary: Request user offboarding (admin only, maker-checker)
      tags: [Users]
      security: [{ bearerAuth: [] }]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [reason]
              properties:
                reason: { type: string }
                effectiveDate: { type: string, format: date }
      responses:
        "202":
          description: Offboarding request queued for approval
        "400":
          description: Validation or self-offboarding blocked
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          description: User not found

  /assignments:
    get:
      summary: List project assignments
      tags: [Assignments]
      security: [{ bearerAuth: [] }]
      parameters:
        - name: userId
          in: query
          schema: { type: string }
        - name: projectId
          in: query
          schema: { type: string }
        - name: status
          in: query
          schema: { type: string, enum: [active, paused, ended] }
      responses:
        "200":
          description: Assignment list
    post:
      summary: Create assignment (critical/backdated changes queue approval)
      tags: [Assignments]
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [userId, projectId, roleOnProject, startDate]
              properties:
                userId: { type: string }
                projectId: { type: string }
                roleOnProject: { type: string }
                allocationPct: { type: number }
                startDate: { type: string, format: date }
                endDate: { type: string, format: date, nullable: true }
      responses:
        "200":
          description: Assignment created
        "202":
          description: Pending approval

  /assignments/{id}:
    patch:
      summary: Update assignment (critical/backdated changes queue approval)
      tags: [Assignments]
      security: [{ bearerAuth: [] }]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                roleOnProject: { type: string }
                allocationPct: { type: number }
                startDate: { type: string, format: date }
                endDate: { type: string, format: date, nullable: true }
                status: { type: string, enum: [active, paused, ended] }
      responses:
        "200":
          description: Assignment updated
        "202":
          description: Pending approval

  /assignments/{id}/end:
    post:
      summary: End assignment
      tags: [Assignments]
      security: [{ bearerAuth: [] }]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [endDate]
              properties:
                endDate: { type: string, format: date }
                reason: { type: string }
      responses:
        "200":
          description: Assignment ended
        "202":
          description: Pending approval

  /rates:
    get:
      summary: List rate cards (admin-only compensation visibility)
      tags: [Rates]
      security: [{ bearerAuth: [] }]
      parameters:
        - name: userId
          in: query
          schema: { type: string }
        - name: projectId
          in: query
          schema: { type: string }
        - name: status
          in: query
          schema: { type: string, enum: [pending, active, superseded, cancelled] }
      responses:
        "200":
          description: Rate cards
    post:
      summary: Submit rate-card create request (maker-checker)
      tags: [Rates]
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [userId, payRate, currency, effectiveFrom]
              properties:
                userId: { type: string }
                projectId: { type: string, nullable: true }
                payRate: { type: number }
                billRate: { type: number, nullable: true }
                currency: { type: string, minLength: 3, maxLength: 3 }
                effectiveFrom: { type: string, format: date }
                effectiveTo: { type: string, format: date, nullable: true }
                changeReason: { type: string, nullable: true }
      responses:
        "202":
          description: Rate change queued for approval

  /rates/{id}:
    get:
      summary: Get a rate card
      tags: [Rates]
      security: [{ bearerAuth: [] }]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      responses:
        "200":
          description: Rate card
    patch:
      summary: Submit rate-card update request (maker-checker)
      tags: [Rates]
      security: [{ bearerAuth: [] }]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                payRate: { type: number }
                billRate: { type: number, nullable: true }
                currency: { type: string, minLength: 3, maxLength: 3 }
                effectiveFrom: { type: string, format: date }
                effectiveTo: { type: string, format: date, nullable: true }
                status: { type: string, enum: [pending, active, superseded, cancelled] }
                changeReason: { type: string, nullable: true }
      responses:
        "202":
          description: Rate change queued for approval

  /rates/resolve:
    get:
      summary: Resolve effective pay/bill rate by date and scope
      tags: [Rates]
      security: [{ bearerAuth: [] }]
      parameters:
        - name: userId
          in: query
          required: true
          schema: { type: string }
        - name: projectId
          in: query
          required: true
          schema: { type: string }
        - name: date
          in: query
          required: true
          schema: { type: string, format: date }
      responses:
        "200":
          description: Resolved rate

  /admin/change-requests:
    get:
      summary: List change requests (admin approvals queue)
      tags: [Approvals]
      security: [{ bearerAuth: [] }]
      parameters:
        - name: status
          in: query
          schema: { type: string, enum: [pending, approved, rejected, cancelled] }
        - name: changeType
          in: query
          schema: { type: string, enum: [rate_change, assignment_change, user_access_change] }
      responses:
        "200":
          description: Change request list

  /admin/change-requests/{id}/approve:
    post:
      summary: Approve change request (reviewer must differ from requester)
      tags: [Approvals]
      security: [{ bearerAuth: [] }]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      responses:
        "200":
          description: Approved
        "400":
          description: Invalid state or maker-checker violation

  /admin/change-requests/{id}/reject:
    post:
      summary: Reject change request
      tags: [Approvals]
      security: [{ bearerAuth: [] }]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [reason]
              properties:
                reason: { type: string }
      responses:
        "200":
          description: Rejected

  /allocations:
    get:
      deprecated: true
      summary: Legacy compatibility endpoint (use /assignments)
      tags: [Compatibility]
      responses:
        "200":
          description: Compatibility payload
    post:
      deprecated: true
      summary: Legacy compatibility endpoint (use /assignments + /rates)
      tags: [Compatibility]
      responses:
        "200":
          description: Compatibility payload
        "202":
          description: Pending approval for critical/rate change

  /projects:
    get:
      summary: List projects (admin/manager only)
      tags: [Projects]
      security: [{ bearerAuth: [] }]
      responses:
        "200":
          description: List of projects
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
    post:
      summary: Create project (admin/manager only)
      tags: [Projects]
      security: [{ bearerAuth: [] }]
      requestBody:
        content:
          application/json:
            schema:
              type: object
              required: [name]
              properties:
                name: { type: string }
                client: { type: string }
                description: { type: string }
                status: { type: string }
                defaultRate: { type: number }
      responses:
        "200":
          description: Created project
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"

  /audit:
    get:
      summary: List audit logs (admin/manager only)
      tags: [Audit]
      security: [{ bearerAuth: [] }]
      parameters:
        - name: entityType
          in: query
          schema: { type: string }
        - name: from
          in: query
          schema: { type: string, format: date }
        - name: to
          in: query
          schema: { type: string, format: date }
      responses:
        "200":
          description: Audit log entries
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"

  /financials/summary:
    get:
      summary: Financial summary (admin/manager only)
      tags: [Financials]
      security: [{ bearerAuth: [] }]
      parameters:
        - name: from
          in: query
          required: true
          schema: { type: string, format: date }
        - name: to
          in: query
          required: true
          schema: { type: string, format: date }
      responses:
        "200":
          description: Summary data
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"

  /reports/payroll:
    get:
      summary: Export payroll CSV (admin/manager only)
      tags: [Reports]
      security: [{ bearerAuth: [] }]
      parameters:
        - name: from
          in: query
          required: true
          schema: { type: string, format: date }
        - name: to
          in: query
          required: true
          schema: { type: string, format: date }
      responses:
        "200":
          description: CSV file
          content:
            text/csv: {}
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    User:
      type: object
      properties:
        id: { type: string }
        email: { type: string, nullable: true }
        firstName: { type: string, nullable: true }
        lastName: { type: string, nullable: true }
        role: { type: string }
        status: { type: string }
        _count:
          type: object
          properties:
            timesheets: { type: integer }
            allocations: { type: integer }
    UserUpdate:
      type: object
      properties:
        role: { type: string, enum: [admin, manager, worker] }
        status: { type: string, enum: [invited, active, suspended, offboarded, archived] }
      minProperties: 1
    Error:
      type: object
      properties:
        error: { type: string }
        details: { type: object }

  responses:
    Unauthorized:
      description: Missing or invalid authentication
      content:
        application/json:
          schema:
            type: object
            properties:
              error: { type: string, example: "Unauthorized" }
    Forbidden:
      description: Insufficient permissions (requires org:admin or org:manager)
      content:
        application/json:
          schema:
            type: object
            properties:
              error: { type: string, example: "Forbidden" }
